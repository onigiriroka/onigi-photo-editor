<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>onigi - photo editor</title>
<style>
  body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 16px; }
  h1 { font-size: 1.1rem; font-weight: normal; margin-bottom: 4px; }
  p.sub { font-size: 0.85rem; color: #666; margin-bottom: 20px; }
  #upload-zone { border: 1px dashed #aaa; padding: 40px; text-align: center; margin-bottom: 20px; cursor: pointer; }
  #editor { display: none; }
  #editor.visible { display: block; }
  .canvas-wrap { position: relative; display: inline-block; max-width: 100%; margin-bottom: 20px; }
  canvas { max-width: 100%; display: block; border: 1px solid #ddd; }
  #crop-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    cursor: crosshair; display: none;
  }
  #crop-overlay.active { display: block; }
  #crop-rect {
    position: absolute; border: 1.5px dashed #fff;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.4);
    pointer-events: none; display: none;
  }
  .row { margin-bottom: 10px; font-size: 0.85rem; }
  .row label { display: inline-block; width: 140px; color: #444; }
  input[type="range"] { width: 200px; vertical-align: middle; }
  .val { display: inline-block; width: 30px; text-align: right; color: #666; font-size: 0.8rem; }
  hr { border: none; border-top: 1px solid #eee; margin: 16px 0; }
  .filters { margin-bottom: 16px; font-size: 0.85rem; }
  .filters span { margin-right: 4px; color: #888; }
  .filter-btn { font-size: 0.8rem; padding: 3px 10px; cursor: pointer; margin-right: 4px; }
  .filter-btn.active { font-weight: bold; }
  .actions { font-size: 0.85rem; }
  .actions button { font-size: 0.82rem; padding: 4px 12px; cursor: pointer; margin-right: 6px; }
  #crop-actions { display: none; font-size: 0.82rem; margin-top: 6px; }
  #crop-actions button { padding: 4px 12px; cursor: pointer; margin-right: 6px; }
  #btn-crop.cropping { font-weight: bold; }
</style>
</head>
<body>

<h1>onigi / photo editor</h1>
<p class="sub">work in progress — no uploads, runs in the browser</p>

<div id="upload-zone" onclick="document.getElementById('file-input').click()">
  <p style="color:#888;font-size:0.9rem;">upload image</p>
  <input type="file" id="file-input" accept="image/*" style="display:none"/>
</div>

<div id="editor">
  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="crop-overlay"></div>
    <div id="crop-rect"></div>
  </div>

  <div id="crop-actions">
    <button onclick="confirmCrop()">apply crop</button>
    <button onclick="cancelCrop()">cancel</button>
  </div>

  <div class="row"><label>brightness</label><input type="range" id="brightness" min="0" max="200" value="100"/><span class="val" id="val-brightness">100</span></div>
  <div class="row"><label>contrast</label><input type="range" id="contrast" min="0" max="200" value="100"/><span class="val" id="val-contrast">100</span></div>
  <div class="row"><label>saturation</label><input type="range" id="saturation" min="0" max="200" value="100"/><span class="val" id="val-saturation">100</span></div>
  <div class="row"><label>blur</label><input type="range" id="blur" min="0" max="10" value="0"/><span class="val" id="val-blur">0</span></div>
  <div class="row"><label>grayscale</label><input type="range" id="grayscale" min="0" max="100" value="0"/><span class="val" id="val-grayscale">0</span></div>
  <div class="row"><label>sepia</label><input type="range" id="sepia" min="0" max="100" value="0"/><span class="val" id="val-sepia">0</span></div>

  <hr/>

  <div class="filters">
    <span>filters:</span>
    <button class="filter-btn active" data-filter="none">none</button>
    <button class="filter-btn" data-filter="vintage">vintage</button>
    <button class="filter-btn" data-filter="cool">cool</button>
    <button class="filter-btn" data-filter="warm">warm</button>
    <button class="filter-btn" data-filter="fade">fade</button>
    <button class="filter-btn" data-filter="dramatic">dramatic</button>
  </div>

  <div class="actions">
    <button onclick="resetAll()">reset</button>
    <button onclick="changeImage()">change photo</button>
    <button id="btn-crop" onclick="toggleCrop()">crop</button>
    <button onclick="downloadImage()">download</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let originalImage = null;
const sliders = ['brightness','contrast','saturation','blur','grayscale','sepia'];
const presets = {
  none:     {brightness:100,contrast:100,saturation:100,blur:0,grayscale:0,sepia:0},
  vintage:  {brightness:110,contrast:85, saturation:75, blur:0,grayscale:0,sepia:40},
  cool:     {brightness:100,contrast:110,saturation:120,blur:0,grayscale:0,sepia:0},
  warm:     {brightness:110,contrast:105,saturation:130,blur:0,grayscale:0,sepia:20},
  fade:     {brightness:130,contrast:80, saturation:70, blur:0,grayscale:10,sepia:10},
  dramatic: {brightness:90, contrast:160,saturation:80, blur:0,grayscale:0,sepia:0}
};

function loadImage(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      originalImage = img;
      canvas.width = img.width;
      canvas.height = img.height;
      document.getElementById('upload-zone').style.display = 'none';
      document.getElementById('editor').classList.add('visible');
      applyFilters();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function applyFilters() {
  if (!originalImage) return;
  const b  = document.getElementById('brightness').value;
  const c  = document.getElementById('contrast').value;
  const s  = document.getElementById('saturation').value;
  const bl = document.getElementById('blur').value;
  const g  = document.getElementById('grayscale').value;
  const se = document.getElementById('sepia').value;
  ctx.filter = `brightness(${b}%) contrast(${c}%) saturate(${s}%) blur(${bl}px) grayscale(${g}%) sepia(${se}%)`;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(originalImage, 0, 0);
}

sliders.forEach(id => {
  const input = document.getElementById(id);
  const label = document.getElementById('val-' + id);
  input.addEventListener('input', () => {
    label.textContent = input.value;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-filter="none"]').classList.add('active');
    applyFilters();
  });
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const values = presets[btn.dataset.filter];
    if (!values) return;
    sliders.forEach(id => {
      document.getElementById(id).value = values[id];
      document.getElementById('val-' + id).textContent = values[id];
    });
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  });
});

function resetAll() {
  const d = {brightness:100,contrast:100,saturation:100,blur:0,grayscale:0,sepia:0};
  sliders.forEach(id => {
    document.getElementById(id).value = d[id];
    document.getElementById('val-' + id).textContent = d[id];
  });
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-filter="none"]').classList.add('active');
  applyFilters();
}

function downloadImage() {
  const link = document.createElement('a');
  link.download = 'onigi-edit.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function changeImage() {
  cancelCrop();
  document.getElementById('editor').classList.remove('visible');
  document.getElementById('upload-zone').style.display = 'block';
  originalImage = null;
  resetAll();
}

document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) loadImage(e.target.files[0]);
});

const zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', e => { e.preventDefault(); });
zone.addEventListener('drop', e => {
  e.preventDefault();
  if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
});

const overlay  = document.getElementById('crop-overlay');
const cropRect = document.getElementById('crop-rect');
let cropping = false;
let drag = { active: false, startX: 0, startY: 0, x: 0, y: 0, w: 0, h: 0 };

function toggleCrop() {
  if (cropping) { cancelCrop(); return; }
  cropping = true;
  overlay.classList.add('active');
  document.getElementById('btn-crop').classList.add('cropping');
  document.getElementById('btn-crop').textContent = 'cancel crop';
}

function cancelCrop() {
  cropping = false;
  drag = { active: false, startX: 0, startY: 0, x: 0, y: 0, w: 0, h: 0 };
  overlay.classList.remove('active');
  cropRect.style.display = 'none';
  document.getElementById('crop-actions').style.display = 'none';
  document.getElementById('btn-crop').classList.remove('cropping');
  document.getElementById('btn-crop').textContent = 'crop';
}

overlay.addEventListener('mousedown', e => {
  const r = overlay.getBoundingClientRect();
  drag.startX = e.clientX - r.left;
  drag.startY = e.clientY - r.top;
  drag.active = true;
  cropRect.style.display = 'block';
  document.getElementById('crop-actions').style.display = 'none';
  updateRect(drag.startX, drag.startY, 0, 0);
});

overlay.addEventListener('mousemove', e => {
  if (!drag.active) return;
  const r = overlay.getBoundingClientRect();
  const cx = e.clientX - r.left;
  const cy = e.clientY - r.top;
  const x = Math.min(cx, drag.startX);
  const y = Math.min(cy, drag.startY);
  const w = Math.abs(cx - drag.startX);
  const h = Math.abs(cy - drag.startY);
  drag.x = x; drag.y = y; drag.w = w; drag.h = h;
  updateRect(x, y, w, h);
});

overlay.addEventListener('mouseup', () => {
  if (!drag.active) return;
  drag.active = false;
  if (drag.w > 5 && drag.h > 5) {
    document.getElementById('crop-actions').style.display = 'block';
  }
});

function updateRect(x, y, w, h) {
  cropRect.style.left   = x + 'px';
  cropRect.style.top    = y + 'px';
  cropRect.style.width  = w + 'px';
  cropRect.style.height = h + 'px';
}

function confirmCrop() {
  const displayW = canvas.offsetWidth;
  const displayH = canvas.offsetHeight;
  const scaleX = canvas.width  / displayW;
  const scaleY = canvas.height / displayH;

  const sx = Math.round(drag.x * scaleX);
  const sy = Math.round(drag.y * scaleY);
  const sw = Math.round(drag.w * scaleX);
  const sh = Math.round(drag.h * scaleY);

  const tmp = document.createElement('canvas');
  tmp.width  = sw;
  tmp.height = sh;
  const tctx = tmp.getContext('2d');
  tctx.drawImage(canvas, sx, sy, sw, sh, 0, 0, sw, sh);

  const cropped = new Image();
  cropped.onload = () => {
    originalImage = cropped;
    canvas.width  = sw;
    canvas.height = sh;
    applyFilters();
    cancelCrop();
  };
  cropped.src = tmp.toDataURL();
}
</script>
</body>
</html>
